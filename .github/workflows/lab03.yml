name: Lab03 Newman Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Verify lint report exists
        run: test -f reports/contract-lint-report.txt

      - name: Start IoT mock
        run: |
          npm run mock:iot &
          sleep 15

      - name: Start Vision mock
        run: |
          npm run mock:vision &
          sleep 15

      - name: Run Newman
        run: npm run test:mock