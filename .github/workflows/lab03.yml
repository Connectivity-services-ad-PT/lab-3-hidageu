name: Lab03 Newman Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Verify lint report exists
        run: test -f reports/contract-lint-report.txt

      - name: Start IoT mock
        run: |
          npx prism mock contracts/iot-ingestion.openapi.yaml -p 4010 > prism-iot.log 2>&1 &
          sleep 15

      - name: Start Vision mock
        run: |
          npx prism mock contracts/ai-vision.openapi.yaml -p 4011 > prism-vision.log 2>&1 &
          sleep 15

      - name: Check mock servers
        run: |
          curl http://localhost:4010/health || true
          curl http://localhost:4011/detect || true

      - name: Run Newman
        run: npm run test:mock

      - name: Show logs
        if: always()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true