name: Contract and Newman Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npx --yes @stoplight/spectral-cli@latest lint "contracts/*.yaml" --ruleset .spectral.yaml > reports/contract-lint-report.txt

      - name: Start IoT Prism mock server
        run: nohup npm run mock:iot > prism-iot.log 2>&1 &

      - name: Start AI Vision Prism mock server
        run: nohup npm run mock:vision > prism-vision.log 2>&1 &

      - name: Wait for mock servers
        run: |
          npx wait-on http://localhost:4010/health --timeout 30000
          # npx wait-on http://localhost:4011/health --timeout 30000

      - name: Run Newman on mock environment
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
